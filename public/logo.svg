<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none">
  <!-- Die body -->
  <rect x="2" y="2" width="44" height="44" rx="10" fill="#D93A28"/>
  <rect x="2" y="2" width="44" height="44" rx="10" fill="url(#shine)" opacity="0.18"/>

  <!-- Subtle inner shadow -->
  <rect x="2" y="2" width="44" height="44" rx="10" stroke="rgba(0,0,0,0.25)" stroke-width="1.5"/>

  <!-- Corner dots -->
  <circle cx="13" cy="13" r="3.5" fill="white" opacity="0.95"/>
  <circle cx="35" cy="13" r="3.5" fill="white" opacity="0.95"/>
  <circle cx="13" cy="35" r="3.5" fill="white" opacity="0.95"/>
  <circle cx="35" cy="35" r="3.5" fill="white" opacity="0.95"/>

  <!-- Center eye: white sclera -->
  <ellipse cx="24" cy="24" rx="8" ry="5.5" fill="white" opacity="0.97"/>

  <!-- Center eye: iris -->
  <circle cx="24" cy="24" r="3.8" fill="#1a0840"/>

  <!-- Center eye: iris color ring -->
  <circle cx="24" cy="24" r="3.8" fill="none" stroke="#7c3aed" stroke-width="1.2" opacity="0.9"/>

  <!-- Center eye: pupil -->
  <circle cx="24" cy="24" r="2" fill="#060010"/>

  <!-- Center eye: catchlight -->
  <circle cx="25.8" cy="22.2" r="1" fill="white" opacity="0.9"/>
  <circle cx="22.8" cy="25.2" r="0.5" fill="white" opacity="0.5"/>

  <!-- Shine gradient def -->
  <defs>
    <linearGradient id="shine" x1="2" y1="2" x2="46" y2="46" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="white"/>
      <stop offset="100%" stop-color="transparent"/>
    </linearGradient>
  </defs>
</svg>
